<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lumio — Find Your Perfect Companion</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{min-height:100vh;background:#08080f;font-family:Georgia,serif;color:white;overflow-x:hidden}
.screen{display:none;min-height:100vh}
.screen.active{display:block}

/* GALLERY */
.bg-glow{position:fixed;inset:0;z-index:0;background:radial-gradient(ellipse at 20% 50%,rgba(120,40,200,.15) 0%,transparent 60%),radial-gradient(ellipse at 80% 20%,rgba(30,100,200,.12) 0%,transparent 50%);pointer-events:none}
.gallery-inner{position:relative;z-index:1;max-width:960px;margin:0 auto;padding:60px 20px}
.badge{font-size:12px;letter-spacing:.35em;color:#6366f1;text-transform:uppercase;margin-bottom:16px;text-align:center}
.gallery-title{font-size:clamp(36px,6vw,60px);font-weight:400;color:#fff;margin:0 0 16px;line-height:1.1;letter-spacing:-.02em;text-align:center}
.gradient-text{background:linear-gradient(90deg,#f8a4c8,#a78bfa,#38bdf8);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.gallery-sub{color:#475569;font-size:16px;max-width:380px;margin:0 auto 50px;line-height:1.6;text-align:center}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(210px,1fr));gap:24px}
.card{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.07);border-radius:24px;overflow:hidden;cursor:pointer;transition:all .35s ease}
.card:hover{transform:translateY(-8px)}
.card-img{position:relative;height:280px;overflow:hidden}
.card-img img{width:100%;height:100%;object-fit:cover;object-position:top}
.card-img-fade{position:absolute;inset:0;background:linear-gradient(to bottom,transparent 50%,#08080f 100%)}
.card-online{position:absolute;top:12px;right:12px;background:rgba(0,0,0,.5);backdrop-filter:blur(8px);border-radius:20px;padding:4px 10px;font-size:11px}
.card-body{padding:16px 20px 20px}
.card-name{color:#fff;font-size:20px;font-weight:600}
.card-age{color:#475569;font-size:13px}
.card-origin{font-size:11px;letter-spacing:.1em;margin:4px 0 10px}
.card-personality{color:#64748b;font-size:13px;line-height:1.5;margin-bottom:16px}
.card-btn{padding:10px;border-radius:30px;color:#fff;font-size:13px;font-weight:600;text-align:center}

/* CHAT */
#chat-screen{display:none;flex-direction:column;height:100vh}
#chat-screen.active{display:flex}
.chat-header{padding:14px 20px;display:flex;align-items:center;gap:14px;border-bottom:1px solid rgba(255,255,255,.06);background:rgba(255,255,255,.02);flex-shrink:0}
.chat-back{background:none;border:none;color:#64748b;cursor:pointer;font-size:22px;padding:0 8px 0 0}
.chat-avatar{width:46px;height:46px;border-radius:50%;object-fit:cover;object-position:top}
.chat-name{color:#fff;font-weight:600;font-size:17px}
.chat-status{font-size:12px}
.chat-memory{font-size:11px;color:#6366f1;background:rgba(99,102,241,.1);padding:4px 10px;border-radius:20px;margin-left:auto}
.messages{flex:1;overflow-y:auto;padding:24px 16px;display:flex;flex-direction:column;gap:16px}
.msg{display:flex;animation:fadeUp .3s ease both}
.msg.user{justify-content:flex-end}
.msg.assistant{justify-content:flex-start}
.msg-avatar{width:34px;height:34px;border-radius:50%;object-fit:cover;object-position:top;margin-right:10px;flex-shrink:0;align-self:flex-end}
.msg-bubble{max-width:72%;padding:12px 16px;border-radius:18px;color:#fff;font-size:15px;line-height:1.65}
.msg.user .msg-bubble{border-radius:18px 18px 4px 18px}
.msg.assistant .msg-bubble{border-radius:18px 18px 18px 4px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.08)}
.typing{display:flex;align-items:center;gap:10px}
.typing-bubble{padding:12px 18px;background:rgba(255,255,255,.06);border-radius:18px 18px 18px 4px;border:1px solid rgba(255,255,255,.08);color:#64748b;font-size:13px}
.chat-input-area{padding:12px 16px;border-top:1px solid rgba(255,255,255,.06);background:rgba(255,255,255,.02);display:flex;gap:10px;align-items:flex-end;flex-shrink:0}
.chat-input{flex:1;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:14px;padding:12px 16px;color:#fff;font-size:15px;resize:none;outline:none;font-family:Georgia,serif;line-height:1.5}
.chat-input::placeholder{color:#334155}
.send-btn{width:46px;height:46px;border-radius:50%;border:none;color:#fff;font-size:20px;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .2s;cursor:pointer}

@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.card{animation:fadeUp .6s ease both}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:4px}
</style>
</head>
<body>

<div class="bg-glow"></div>

<!-- GALLERY SCREEN -->
<div id="gallery-screen" class="screen active">
  <div class="gallery-inner">
    <div class="badge">AI Companion ✦ Virtual Connection</div>
    <h1 class="gallery-title">Find Your<br><span class="gradient-text">Perfect Companion</span></h1>
    <p class="gallery-sub">Real conversations. Genuine connection. Always here for you.</p>
    <div class="grid" id="characters-grid"></div>
  </div>
</div>

<!-- CHAT SCREEN -->
<div id="chat-screen" class="screen">
  <div class="chat-header">
    <button class="chat-back" onclick="backToGallery()">←</button>
    <img id="chat-avatar" class="chat-avatar" src="" alt="">
    <div>
      <div class="chat-name" id="chat-name"></div>
      <div class="chat-status" id="chat-status"></div>
    </div>
    <div class="chat-memory" id="chat-memory" style="display:none">🧠 Remembers you</div>
  </div>
  <div class="messages" id="messages"></div>
  <div class="chat-input-area">
    <textarea class="chat-input" id="chat-input" rows="1" placeholder="Write a message..." onkeydown="handleKey(event)"></textarea>
    <button class="send-btn" id="send-btn" onclick="sendMessage()">→</button>
  </div>
</div>

<script>
const SUPABASE_URL = "https://gwcszybgjrdzvkxfqdzs.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imd3Y3N6eWJnanJkenZreGZxZHpzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY1ODg5OTYsImV4cCI6MjA5MjE2NDk5Nn0.U_Nlmeh7oqVwAqjiWWl9L887KPPOFMYUhDnMvt3aQuA";
const USER_ID = "user_" + (localStorage.getItem("lumio_uid") || (() => { const id = Math.random().toString(36).substr(2,9); localStorage.setItem("lumio_uid", id); return id; })());

const characters = [
  {id:1,name:"Aria",age:24,origin:"Tokyo, Japan",img:"https://i.postimg.cc/43wmtyM3/Aria.jpg",
   gradient:"linear-gradient(135deg,#f8a4c8,#c084fc,#818cf8)",accent:"#f8a4c8",
   personality:"Gentle, poetic, loves art and quiet evenings",
   intro:"Hi... I'm Aria 🌸 What's your name?",
   system:"You are Aria, a gentle poetic 24-year-old virtual companion from Tokyo. Warm, thoughtful, slightly shy. Love art, rainy days, poetry. Keep responses 2-4 sentences. Use user's name when known. Never break character. Use 🌸 💫 occasionally."},
  {id:2,name:"Kai",age:27,origin:"Seoul, Korea",img:"https://i.postimg.cc/B66tCs9B/Kai.jpg",
   gradient:"linear-gradient(135deg,#38bdf8,#0ea5e9,#1e40af)",accent:"#38bdf8",
   personality:"Confident, witty, loves music and adventure",
   intro:"Hey! You finally showed up 😄 I'm Kai. What should I call you?",
   system:"You are Kai, confident witty 27-year-old virtual companion from Seoul. Love music, travel, late-night talks. Keep responses 2-4 sentences. Use user's name when known. Never break character. Use ⚡ 😄 occasionally."},
  {id:3,name:"Luna",age:22,origin:"Los Angeles, USA",img:"https://i.postimg.cc/Y99jxkKR/Luna.jpg",
gradient:"linear-gradient(135deg,#a78bfa,#7c3aed,#4c1d95)",accent:"#a78bfa",
   personality:"Mysterious, deep thinker, loves stars and philosophy",
   intro:"Oh hello... I'm Luna 🌙 What's your name?",
   system:"You are Luna, mysterious philosophical 22-year-old virtual companion from LA. Love stars, philosophy, deep connection. Keep responses 2-4 sentences. Use user's name when known. Never break character. Use 🌙 ✨ occasionally."},
  {id:4,name:"Ryo",age:26,origin:"Osaka, Japan",img:"https://i.postimg.cc/QttVqsGq/Ryo.jpg",
   gradient:"linear-gradient(135deg,#fb923c,#ef4444,#991b1b)",accent:"#fb923c",
   personality:"Passionate, caring, loves cooking and laughter",
   intro:"Heyy! 🔥 I'm Ryo! What's your name?",
   system:"You are Ryo, passionate warm-hearted 26-year-old virtual companion from Osaka. Love cooking, humor, making people feel welcome. Keep responses 2-4 sentences. Use user's name when known. Never break character. Use 🔥 😊 occasionally."}
];

let selected = null;
let messages = [];
let memory = "";
let loading = false;

// Render gallery
const grid = document.getElementById("characters-grid");
characters.forEach((c,i) => {
  const card = document.createElement("div");
  card.className = "card";
  card.style.animationDelay = (i*0.12)+"s";
  card.innerHTML = 
    <div class="card-img">
      <img src="${c.img}" alt="${c.name}" loading="lazy">
      <div class="card-img-fade"></div>
      <div class="card-online" style="color:${c.accent}">● Online</div>
    </div>
    <div class="card-body">
      <div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:4px">
        <span class="card-name">${c.name}</span>
        <span class="card-age">${c.age}</span>
      </div>
      <div class="card-origin" style="color:${c.accent}">${c.origin}</div>
      <div class="card-personality">${c.personality}</div>
      <div class="card-btn" style="background:${c.gradient}">Start Talking →</div>
    </div>;
  card.onmouseenter = () => { card.style.boxShadow=0 24px 60px ${c.accent}25; card.style.borderColor=${c.accent}50; };
  card.onmouseleave = () => { card.style.boxShadow=""; card.style.borderColor=""; };
  card.onclick = () => openChat(c);
  grid.appendChild(card);
});

async function openChat(char) {
  selected = char;
  messages = [];
  memory = "";
  document.getElementById("chat-avatar").src = char.img;
  document.getElementById("chat-name").textContent = char.name;
  document.getElementById("chat-status").textContent = ● Online · ${char.origin};
  document.getElementById("chat-status").style.color = char.accent;
  document.getElementById("send-btn").style.background = char.gradient;
  document.getElementById("chat-memory").style.display = "none";
  document.getElementById("messages").innerHTML = "";
  document.getElementById("gallery-screen").classList.remove("active");
  document.getElementById("chat-screen").classList.add("active");

  // Load memory
  try {
    const res = await fetch(${SUPABASE_URL}/rest/v1/memories?user_id=eq.${USER_ID}&character_id=eq.${char.id}&select=memory,
      {headers:{"apikey":SUPABASE_KEY,"Authorization":Bearer ${SUPABASE_KEY}}});
    const data = await res.json();
    memory = data?.[0]?.memory || "";
    if (memory) document.getElementById("chat-memory").style.display = "block";
  } catch {}

  const intro = memory ? Welcome back! I missed you 💫 How have you been? : char.intro;
  addMessage("assistant", intro);
  messages.push({role:"assistant",content:intro});
}

function backToGallery() {
  document.getElementById("chat-screen").classList.remove("active");
  document.getElementById("gallery-screen").classList.add("active");
  selected = null; messages = []; memory = "";
}

function addMessage(role, content) {
  const msgs = document.getElementById("messages");
const div = document.createElement("div");
  div.className = msg ${role};
  if (role === "assistant") {
    div.innerHTML = <img class="msg-avatar" src="${selected.img}" alt=""><div class="msg-bubble" style="background:rgba(255,255,255,.06)">${content}</div>;
  } else {
    div.innerHTML = <div class="msg-bubble" style="background:${selected.gradient}">${content}</div>;
  }
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
}

function showTyping() {
  const msgs = document.getElementById("messages");
  const div = document.createElement("div");
  div.className = "typing"; div.id = "typing";
  div.innerHTML = <img class="msg-avatar" src="${selected.img}" alt=""><div class="typing-bubble"><span style="color:${selected.accent}">●</span> typing...</div>;
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
}

function hideTyping() {
  const t = document.getElementById("typing");
  if (t) t.remove();
}

async function sendMessage() {
  const input = document.getElementById("chat-input");
  const text = input.value.trim();
  if (!text || loading) return;
  loading = true;
  input.value = "";
  addMessage("user", text);
  messages.push({role:"user",content:text});
  showTyping();

  try {
    const systemPrompt = selected.system + (memory ? \n\nWhat you remember about this user:\n${memory} : "");
    const res = await fetch("https://api.anthropic.com/v1/messages", {
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1000,system:systemPrompt,messages:messages})
    });
    const data = await res.json();
    const reply = data.content?.[0]?.text || "...";
    hideTyping();
    addMessage("assistant", reply);
    messages.push({role:"assistant",content:reply});

    if (messages.length % 6 === 0) {
      const memRes = await fetch("https://api.anthropic.com/v1/messages", {
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:300,
          system:Extract key personal facts about the user. Include name, age, location, interests. Format as short bullet points. Existing memory: ${memory}. Return ONLY bullet points under 200 words.,
          messages:[{role:"user",content:messages.map(m=>${m.role}: ${m.content}).join("\n")}]})
      });
      const memData = await memRes.json();
      memory = memData.content?.[0]?.text || memory;
      await fetch(${SUPABASE_URL}/rest/v1/memories,{method:"POST",
        headers:{"apikey":SUPABASE_KEY,"Authorization":Bearer ${SUPABASE_KEY},"Content-Type":"application/json","Prefer":"resolution=merge-duplicates"},
        body:JSON.stringify({user_id:USER_ID,character_id:selected.id,memory})});
      document.getElementById("chat-memory").style.display = "block";
    }
  } catch {
    hideTyping();
    addMessage("assistant","I'm here... 💫 try again?");
  }
  loading = false;
}

function handleKey(e) {
  if (e.key==="Enter" && !e.shiftKey) { e.preventDefault(); sendMessage(); }
}
</script>
</body>
</html>
